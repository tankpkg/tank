apiVersion: v2
name: tank
description: >-
  Security-first package manager for AI agent skills.
  Deploys the Tank web registry, Python security scanner,
  PostgreSQL, Redis, and MinIO for on-premises installations.
type: application
version: 0.1.0
appVersion: "1.0.0"
home: https://github.com/tankpkg/tank
sources:
  - https://github.com/tankpkg/tank
maintainers:
  - name: Tank Team
    url: https://github.com/tankpkg
keywords:
  - tank
  - ai
  - agent
  - skills
  - security
  - package-manager
icon: https://raw.githubusercontent.com/tankpkg/tank/main/assets/logo.png

dependencies:
  - name: postgresql
    version: "~15"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "~19"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: minio
    version: "~5"
    repository: https://charts.min.io/
    condition: minio.enabled
