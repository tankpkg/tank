{{- if .Values.dbMigration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "tank.fullname" . }}-db-migrate-{{ .Release.Revision }}
  labels:
    {{- include "tank.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-migrate
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "tank.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: db-migrate
    spec:
      {{- with .Values.web.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "tank.serviceAccountName" . }}
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "tank.postgresHost" . }} {{ .Values.global.postgresql.port }}; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: migrate
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Running database migrations..."
              npx drizzle-kit push --force
              echo "Migrations complete."
          envFrom:
            - configMapRef:
                name: {{ include "tank.sharedConfigmapName" . }}
            - configMapRef:
                name: {{ include "tank.webConfigmapName" . }}
            - secretRef:
                name: {{ include "tank.secretName" . }}
          {{- with .Values.dbMigration.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
