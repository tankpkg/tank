{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tank.secretName" . }}
  labels:
    {{- include "tank.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "tank.databaseUrl" . | quote }}
  BETTER_AUTH_SECRET: {{ .Values.secrets.betterAuthSecret | quote }}
  S3_ACCESS_KEY: {{ .Values.global.storage.s3.accessKey | quote }}
  S3_SECRET_KEY: {{ .Values.global.storage.s3.secretKey | quote }}
  {{- if .Values.secrets.githubClientSecret }}
  GITHUB_CLIENT_SECRET: {{ .Values.secrets.githubClientSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.oidcClientSecret }}
  OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.resendApiKey }}
  RESEND_API_KEY: {{ .Values.secrets.resendApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.llmApiKey }}
  LLM_API_KEY: {{ .Values.secrets.llmApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.groqApiKey }}
  GROQ_API_KEY: {{ .Values.secrets.groqApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.openrouterApiKey }}
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | quote }}
  {{- end }}
{{- end }}
