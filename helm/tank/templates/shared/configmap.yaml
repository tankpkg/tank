apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tank.sharedConfigmapName" . }}
  labels:
    {{- include "tank.labels" . | nindent 4 }}
data:
  # DATABASE_URL and REDIS_URL are in the Secret (may contain passwords)
  S3_ENDPOINT: {{ include "tank.s3Endpoint" . | quote }}
  S3_BUCKET: {{ .Values.global.storage.s3.bucket | quote }}
  S3_REGION: {{ .Values.global.storage.s3.region | quote }}
  STORAGE_BACKEND: {{ .Values.global.storage.backend | quote }}
  PYTHON_API_URL: {{ include "tank.scannerUrl" . | quote }}
