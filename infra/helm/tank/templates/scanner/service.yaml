apiVersion: v1
kind: Service
metadata:
  name: {{ include "tank.fullname" . }}-scanner
  labels:
    {{- include "tank.scanner.labels" . | nindent 4 }}
spec:
  type: {{ .Values.scanner.service.type }}
  ports:
    - port: {{ .Values.scanner.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "tank.scanner.selectorLabels" . | nindent 4 }}
