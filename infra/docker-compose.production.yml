# Tank — Production Deployment (Pre-built Images)
#
# This compose file uses published images from ghcr.io.
# No repository clone required — download this single file to deploy.
#
# Quick start:
#   curl -fsSL https://raw.githubusercontent.com/tankpkg/tank/main/infra/docker-compose.production.yml -o docker-compose.yml
#   curl -fsSL https://raw.githubusercontent.com/tankpkg/tank/main/.env.example.onprem -o .env
#   # Edit .env — at minimum set BETTER_AUTH_SECRET (openssl rand -base64 32)
#   docker compose up -d
#
# Pin a specific version:
#   TANK_IMAGE_TAG=1.2.3 docker compose up -d

services:
  # ===================
  # PostgreSQL Database
  # ===================
  postgres:
    image: postgres:17-alpine
    container_name: tank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tank}
      POSTGRES_DB: ${POSTGRES_DB:-tank}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tank} -d ${POSTGRES_DB:-tank}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tank-network

  # ===================
  # MinIO (S3-Compatible Storage)
  # ===================
  minio:
    image: minio/minio:latest
    container_name: tank-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tank}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tank123456}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tank-network

  # ===================
  # Python Security Scanner
  # ===================
  scanner:
    image: ghcr.io/tankpkg/tank-scanner:${TANK_IMAGE_TAG:-latest}
    container_name: tank-scanner
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tank}:${POSTGRES_PASSWORD:-tank}@postgres:5432/${POSTGRES_DB:-tank}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LLM_SCAN_TIMEOUT_MS: ${LLM_SCAN_TIMEOUT_MS:-8000}
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tank-network

  # ===================
  # Tank Web Application (TanStack Start)
  # ===================
  registry:
    image: ghcr.io/tankpkg/tank-web:${TANK_IMAGE_TAG:-latest}
    container_name: tank-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tank}:${POSTGRES_PASSWORD:-tank}@postgres:5432/${POSTGRES_DB:-tank}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      APP_URL: ${APP_URL:-http://localhost:3000}
      AUTH_PROVIDERS: ${AUTH_PROVIDERS:-credentials}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      OIDC_PROVIDER_ID: ${OIDC_PROVIDER_ID:-}
      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-tank}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-tank123456}
      S3_BUCKET: ${S3_BUCKET:-packages}
      S3_REGION: ${S3_REGION:-us-east-1}
      PYTHON_API_URL: http://scanner:8000
      NODE_ENV: production
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@tank.local}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-}
      TANK_MODE: selfhosted
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      scanner:
        condition: service_started
    networks:
      - tank-network

  # ===================
  # Optional: Local LLM (Ollama)
  # ===================
  ollama:
    image: ollama/ollama:latest
    container_name: tank-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - tank-network
    profiles:
      - llm-local

networks:
  tank-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  ollama_data:
