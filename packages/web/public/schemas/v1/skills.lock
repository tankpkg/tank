{
  "$schema": "http://json-schema.org/draft-07/schema#",
  "type": "object",
  "properties": {
    "$schema": {
      "type": "string",
      "const": "https://www.tankpkg.dev/schemas/v1/skills.lock"
    },
    "lockfileVersion": {
      "anyOf": [
        {
          "type": "number",
          "const": 1
        },
        {
          "type": "number",
          "const": 2
        }
      ]
    },
    "skills": {
      "type": "object",
      "propertyNames": {
        "type": "string"
      },
      "additionalProperties": {
        "type": "object",
        "properties": {
          "resolved": {
            "type": "string",
            "format": "uri"
          },
          "integrity": {
            "type": "string",
            "pattern": "^sha512-"
          },
          "permissions": {
            "type": "object",
            "properties": {
              "network": {
                "type": "object",
                "properties": {
                  "outbound": {
                    "type": "array",
                    "items": {
                      "type": "string"
                    }
                  }
                },
                "additionalProperties": false
              },
              "filesystem": {
                "type": "object",
                "properties": {
                  "read": {
                    "type": "array",
                    "items": {
                      "type": "string"
                    }
                  },
                  "write": {
                    "type": "array",
                    "items": {
                      "type": "string"
                    }
                  }
                },
                "additionalProperties": false
              },
              "subprocess": {
                "type": "boolean"
              }
            },
            "additionalProperties": false
          },
          "audit_score": {
            "anyOf": [
              {
                "type": "number",
                "minimum": 0,
                "maximum": 10
              },
              {
                "type": "null"
              }
            ]
          },
          "dependencies": {
            "type": "object",
            "propertyNames": {
              "type": "string"
            },
            "additionalProperties": {
              "type": "string"
            }
          }
        },
        "required": [
          "resolved",
          "integrity",
          "permissions",
          "audit_score"
        ],
        "additionalProperties": false
      }
    }
  },
  "required": [
    "lockfileVersion",
    "skills"
  ],
  "additionalProperties": false,
  "$id": "https://www.tankpkg.dev/schemas/v1/skills.lock"
}
