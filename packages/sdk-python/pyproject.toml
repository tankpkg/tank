[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tank-sdk"
dynamic = ["version"]
description = "Official Python SDK for the Tank registry — search, download, and read AI agent skills programmatically, with security built in"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Tank Contributors", email = "hi@tankpkg.dev" }]
keywords = ["tank", "tankpkg", "ai-agents", "claude-code", "skills", "package-manager", "security", "registry"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Security",
    "Typing :: Typed",
]
dependencies = ["httpx>=0.27"]

[project.optional-dependencies]
# Optional Rust acceleration; SDK falls back to pure-Python if tank-core import fails at runtime.
# Version pinned by `just bump` to match the monorepo — keeps ABI and wire-format aligned.
native = ["tank-core==0.15.7"]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "openai"]

[project.urls]
Homepage = "https://tankpkg.dev"
Documentation = "https://www.tankpkg.dev/docs/sdk-python"
Repository = "https://github.com/tankpkg/tank"
Issues = "https://github.com/tankpkg/tank/issues"
Changelog = "https://github.com/tankpkg/tank/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["tankpkg"]

[tool.hatch.version]
path = "tankpkg/_version.py"
