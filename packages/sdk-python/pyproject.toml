[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tankpkg"
version = "0.10.6"
description = "Official Python SDK for the Tank registry — search, download, and read AI agent skills programmatically"
requires-python = ">=3.9"
license = "MIT"
dependencies = ["httpx>=0.27"]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "openai"]

[tool.hatch.build.targets.wheel]
packages = ["tankpkg"]
