name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Please fill out the sections below so we can reproduce and fix the issue.

  - type: checkboxes
    id: pre-submission
    attributes:
      label: Pre-Submission Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I can reproduce this on the latest version of Tank.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear, concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `tank install @org/skill`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error Output / Logs
      description: Paste the full error message, stack trace, or relevant log output. Run with `TANK_DEBUG=1` for verbose logs.
      render: bash

  - type: dropdown
    id: scope
    attributes:
      label: Affected Area
      description: Which part of Tank is affected?
      options:
        - CLI
        - MCP Server
        - Registry / Web
        - Security Scanner
        - Permissions
        - Skills Resolution
        - Other
    validations:
      required: true

  - type: input
    id: tank-version
    attributes:
      label: Tank Version
      description: Output of `tank --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: "v24.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or `skills.json` / `tank-lock.json` snippets that might help.
