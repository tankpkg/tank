name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  deploy-scanner:
    runs-on: ubuntu-latest
    # Only deploy on push to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if scanner changed
        id: check-changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^apps/python-api/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Scanner to Vercel
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          cd apps/python-api
          npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PYTHON_API_PROJECT_ID }}

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
      SUPABASE_URL: https://fake.supabase.co
      BETTER_AUTH_SECRET: ci-test-secret-not-real
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Lint & format check
        run: bun run lint:check && bun run format:check

      - name: Run JavaScript/TypeScript tests
        run: bun run test

      - name: Install UV
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Run Python tests
        run: cd apps/python-api && PYTHONPATH=. uv run pytest lib/scan/test_llm_analyzer.py -v

      - name: Ruff lint
        run: uv run ruff check apps/python-api

      - name: Ruff format check
        run: uv run ruff format --check apps/python-api

  performance:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: tank
          POSTGRES_PASSWORD: tank
          POSTGRES_DB: tank_perf
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U tank -d tank_perf"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://tank:tank@localhost:5432/tank_perf
      BETTER_AUTH_SECRET: ci-perf-secret-not-real
      NEXT_PUBLIC_APP_URL: http://localhost:3999
      TANK_PERF_MODE: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        run: supabase start

      - name: Export Supabase env vars
        run: |
          echo "SUPABASE_URL=$(supabase status --output json | jq -r '.API_URL')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status --output json | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_ENV

      - name: Build all packages
        run: bun run build

      - name: Enable PostgreSQL extensions
        run: psql "$DATABASE_URL" -c "CREATE EXTENSION IF NOT EXISTS pg_trgm"
        env:
          DATABASE_URL: postgresql://tank:tank@localhost:5432/tank_perf

      - name: Provision database schema
        run: cd apps/web && bun x drizzle-kit push --force
        env:
          DATABASE_URL: postgresql://tank:tank@localhost:5432/tank_perf

      - name: Seed deterministic perf data
        run: cd apps/web && bun run perf:seed

      - name: Run performance tests
        id: perf-test
        run: cd apps/web && bun run perf:test

      - name: Generate performance report
        if: always() && steps.perf-test.outcome != 'skipped'
        run: cd apps/web && bun run perf:report || true

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: apps/web/perf/results/*.json
          if-no-files-found: warn
          retention-days: 30
