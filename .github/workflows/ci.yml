name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  deploy-scanner:
    runs-on: ubuntu-latest
    # Only deploy on push to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if scanner changed
        id: check-changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^apps/python-api/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Scanner to Vercel
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          cd apps/python-api
          npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PYTHON_API_PROJECT_ID }}

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
      SUPABASE_URL: https://fake.supabase.co
      BETTER_AUTH_SECRET: ci-test-secret-not-real
      APP_URL: http://localhost:5555

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build

      - name: Lint & format check
        run: bun run lint:readonly && bun run format:readonly

      - name: Run JavaScript/TypeScript tests
        run: bun run test

      - name: Install UV
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Run Python tests
        run: cd apps/python-api && PYTHONPATH=. uv run pytest lib/scan/test_llm_analyzer.py -v

      - name: Ruff lint
        run: uv run ruff check apps/python-api

      - name: Ruff format check
        run: uv run ruff format --check apps/python-api
