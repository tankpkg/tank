name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux-x64
            target: bun-linux-x64
            output: tank-linux-x64
          - runner: ubuntu-22.04
            platform: linux-arm64
            target: bun-linux-arm64
            output: tank-linux-arm64
          - runner: macos-14
            platform: darwin-arm64
            target: bun-darwin-arm64
            output: tank-darwin-arm64
          - runner: macos-14
            platform: darwin-x64
            target: bun-darwin-x64
            output: tank-darwin-x64
          - runner: windows-latest
            platform: windows-x64
            target: bun-windows-x64
            output: tank-windows-x64.exe

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
      - uses: extractions/setup-just@v2

      - run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          just ci-build-cli "${VERSION}"
          cd packages/cli && bun run build:bundle
          TARGET=${{ matrix.target }} OUTPUT_NAME=${{ matrix.output }} bun run build:sea

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar -czf packages/cli/build/${{ matrix.output }}.tar.gz -C packages/cli/build ${{ matrix.output }}

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path packages/cli/build/${{ matrix.output }} -DestinationPath packages/cli/build/tank-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: packages/cli/build/${{ matrix.output }}*
          if-no-files-found: error

  release:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten + package
        run: |
          mkdir -p release
          find dist -type f -exec mv {} release/ \;
          sudo gem install --no-document fpm
          VERSION="${GITHUB_REF_NAME#v}"
          fpm -s dir -t deb -n tank -v "$VERSION" --architecture amd64 --package release/tank_${VERSION}_amd64.deb release/tank-linux-x64=/usr/local/bin/tank
          fpm -s dir -t deb -n tank -v "$VERSION" --architecture arm64 --package release/tank_${VERSION}_arm64.deb release/tank-linux-arm64=/usr/local/bin/tank
          cd release && sha256sum tank-* *.deb 2>/dev/null | sort > SHA256SUMS || true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

  # npm publish lives in cli-nightly.yml (tag-push trigger). DO NOT add an
  # `npm publish` job here: npm Trusted Publishing binds each package to ONE
  # workflow filename, and cli-nightly.yml is the registered publisher for
  # @tankpkg/cli, @tankpkg/mcp-server, @tankpkg/sdk. Adding a publish job
  # here would silently 404 on every release.

  update-homebrew:
    runs-on: ubuntu-22.04
    needs: release
    continue-on-error: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_DARWIN_ARM64="$(curl -sfL "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/tank-darwin-arm64.tar.gz" | sha256sum | awk '{print $1}')"
          SHA_DARWIN_X64="$(curl -sfL "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/tank-darwin-x64.tar.gz" | sha256sum | awk '{print $1}')"
          SHA_LINUX_ARM64="$(curl -sfL "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/tank-linux-arm64.tar.gz" | sha256sum | awk '{print $1}')"
          SHA_LINUX_X64="$(curl -sfL "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/tank-linux-x64.tar.gz" | sha256sum | awk '{print $1}')"
          mkdir -p Formula
          cat > Formula/tank.rb << EOF
          class Tank < Formula
            desc "Security-first package manager for AI agent skills"
            homepage "https://tankpkg.dev"
            version "${VERSION}"
            if OS.mac? && Hardware::CPU.arm?
              url "https://github.com/${{ github.repository }}/releases/download/v#{version}/tank-darwin-arm64.tar.gz"
              sha256 "${SHA_DARWIN_ARM64}"
            elsif OS.mac?
              url "https://github.com/${{ github.repository }}/releases/download/v#{version}/tank-darwin-x64.tar.gz"
              sha256 "${SHA_DARWIN_X64}"
            elsif OS.linux? && Hardware::CPU.arm?
              url "https://github.com/${{ github.repository }}/releases/download/v#{version}/tank-linux-arm64.tar.gz"
              sha256 "${SHA_LINUX_ARM64}"
            else
              url "https://github.com/${{ github.repository }}/releases/download/v#{version}/tank-linux-x64.tar.gz"
              sha256 "${SHA_LINUX_X64}"
            end
            def install
              bin.install Dir["tank-*"].first => "tank"
            end
            test do
              system "#{bin}/tank", "--version"
            end
          end
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/homebrew-v${VERSION}"
          git checkout -b "${BRANCH}"
          git add Formula/tank.rb
          git diff --cached --quiet || (git commit -m "chore: update Homebrew formula for v${VERSION}" && git push origin "${BRANCH}" && gh pr create --title "chore: update Homebrew formula for v${VERSION}" --body "Auto-generated by release pipeline." --base main --head "${BRANCH}")

  build-pypi-sdk:
    name: Build tank-sdk (pure Python)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: extractions/setup-just@v2
      - run: just ci-build-pypi-sdk "${GITHUB_REF_NAME#v}"
      - uses: actions/upload-artifact@v4
        with:
          name: pypi-tank-sdk
          path: packages/sdk-python/dist/*
          if-no-files-found: error

  build-pypi-core-wheels:
    name: Build tank-core wheel (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux-x86_64
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          - runner: ubuntu-22.04
            platform: linux-aarch64
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
          - runner: macos-14
            platform: darwin-x86_64
            target: x86_64-apple-darwin
            manylinux: "off"
          - runner: macos-14
            platform: darwin-arm64
            target: aarch64-apple-darwin
            manylinux: "off"
          - runner: windows-latest
            platform: windows-x86_64
            target: x86_64-pc-windows-msvc
            manylinux: "off"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --compatibility pypi
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          working-directory: packages/sdk-core/crates/python
      - uses: actions/upload-artifact@v4
        with:
          name: pypi-tank-core-${{ matrix.platform }}
          path: packages/sdk-core/crates/python/dist/*
          if-no-files-found: error

  build-pypi-core-sdist:
    name: Build tank-core sdist
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: extractions/setup-just@v2
      - run: just ci-build-pypi-core-sdist
      - uses: actions/upload-artifact@v4
        with:
          name: pypi-tank-core-sdist
          path: packages/sdk-core/crates/python/dist/*
          if-no-files-found: error

  publish-pypi-sdk:
    name: Publish tank-sdk to PyPI
    runs-on: ubuntu-22.04
    needs: build-pypi-sdk
    environment:
      name: pypi
      url: https://pypi.org/project/tank-sdk/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pypi-tank-sdk
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          print-hash: true

  publish-pypi-core:
    name: Publish tank-core to PyPI
    runs-on: ubuntu-22.04
    needs: [build-pypi-core-wheels, build-pypi-core-sdist]
    environment:
      name: pypi
      url: https://pypi.org/project/tank-core/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pypi-tank-core-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          print-hash: true
