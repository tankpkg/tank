name: Docs Drift Check

on:
  pull_request:
    paths:
      - "packages/cli/src/**/*.ts"
      - "packages/web/app/api/**/*.ts"
      - "packages/web/content/docs/**"
  push:
    branches: [main]
    paths:
      - "packages/cli/src/**/*.ts"
      - "packages/web/app/api/**/*.ts"
      - "packages/web/content/docs/**"

env:
  BUN_CONFIG_REGISTRY: https://registry.npmjs.org/

jobs:
  check-docs-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate CLI docs
        run: node scripts/gen-cli-docs.mjs

      - name: Generate API docs
        run: node scripts/gen-api-docs.mjs

      - name: Generate llms.txt
        run: node scripts/gen-llms-txt.mjs

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code packages/web/content/docs/cli.mdx || (echo "CLI docs are out of sync. Run: node scripts/gen-cli-docs.mjs" && exit 1)
          git diff --exit-code packages/web/content/docs/api.mdx || (echo "API docs are out of sync. Run: node scripts/gen-api-docs.mjs" && exit 1)
          git diff --exit-code packages/web/public/llms.txt || (echo "llms.txt is out of sync. Run: node scripts/gen-llms-txt.mjs" && exit 1)
          git diff --exit-code packages/web/public/llms-full.txt || (echo "llms-full.txt is out of sync. Run: node scripts/gen-llms-txt.mjs" && exit 1)
          echo "All generated docs are in sync"
